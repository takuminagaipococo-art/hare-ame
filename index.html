<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>晴れか雨か - 人生の天気診断</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Klee+One:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:#faf6f0;
  color:#3d3529;
  min-height:100vh;
  overflow-x:hidden;
}

/* paper texture */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

.wrap{
  position:relative;z-index:1;
  max-width:480px;margin:0 auto;
  padding:24px 16px 80px;
}

/* ===== HEADER ===== */
.hero{text-align:center;padding:32px 0 20px;position:relative}

.hero-deco{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:200px;height:60px;opacity:0.15;
  background:repeating-linear-gradient(90deg,transparent,transparent 8px,#e8a84c 8px,#e8a84c 9px);
  border-radius:30px;
}

.hero h1{
  font-family:'Klee One',serif;
  font-size:26px;font-weight:600;
  color:#5a4a3a;line-height:1.5;
  letter-spacing:0.02em;
}
.hero h1 .accent{color:#d4722a}
.hero h1 .accent2{color:#4a7fb5}

.hero-sub{
  margin-top:6px;
  font-size:13px;color:#9e9080;
  font-family:'Klee One',serif;
}

/* ===== SECTION ===== */
.sec{
  background:#fff;
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:0 1px 8px rgba(90,60,20,0.06);
  border:1px solid rgba(180,160,130,0.15);
}

.sec-title{
  font-size:14px;font-weight:700;
  color:#7a6a55;
  margin-bottom:14px;
  padding-left:2px;
  display:flex;align-items:center;gap:6px;
}

.sec-title .dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;
}

/* ===== FORM ===== */
.nickname-row{display:flex;gap:8px;align-items:end}
.nickname-row>:first-child{flex:1}

.field label{
  display:block;font-size:11px;
  color:#a09080;margin-bottom:3px;
  font-weight:500;
}

.field input,.field select{
  width:100%;padding:10px 12px;
  border-radius:12px;
  border:1.5px solid #e5ddd2;
  background:#fdfbf8;color:#3d3529;
  font-size:14px;font-family:inherit;
  outline:none;transition:border-color 0.2s;
}
.field input:focus{border-color:#d4a574}
.field input::placeholder{color:#c5b8a8}

.gender-pills{display:flex;gap:6px;margin-top:2px}
.g-pill{
  flex:1;padding:9px 0;
  border-radius:10px;
  border:1.5px solid #e5ddd2;
  background:#fdfbf8;
  color:#a09080;font-size:13px;font-weight:500;
  cursor:pointer;text-align:center;
  transition:all 0.2s;font-family:inherit;
}
.g-pill.on{
  border-color:#d4a574;
  background:#fef5ec;color:#b87830;
}

/* Templates */
.tmpl-wrap{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:14px;
}
.tmpl{
  padding:6px 12px;
  border-radius:18px;
  border:1.5px solid #ece4d8;
  background:#fdfbf7;
  color:#7a6a55;font-size:12px;
  cursor:pointer;transition:all 0.15s;
  font-family:inherit;font-weight:500;
  white-space:nowrap;
}
.tmpl:hover{background:#f5ece0;border-color:#d4c4aa}
.tmpl:active{transform:scale(0.96)}

.form-row{display:flex;gap:8px;margin-top:8px}
.form-row>.field{flex:1}

.loc-wrap{position:relative}

.suggestions{
  position:absolute;z-index:10;
  background:#fff;
  border:1.5px solid #e5ddd2;
  border-radius:12px;
  max-height:150px;overflow-y:auto;
  width:100%;display:none;
  box-shadow:0 6px 20px rgba(90,60,20,0.1);
  margin-top:2px;
}
.suggestions.on{display:block}
.sug-item{
  padding:9px 12px;cursor:pointer;
  font-size:13px;color:#5a4a3a;
  transition:background 0.1s;
}
.sug-item:hover{background:#faf3ea}
.sug-item:first-child{border-radius:10px 10px 0 0}
.sug-item:last-child{border-radius:0 0 10px 10px}

.add-btn{
  width:100%;padding:11px;margin-top:10px;
  border-radius:12px;
  border:1.5px dashed #d4c4aa;
  background:transparent;
  color:#a09080;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  font-family:inherit;
}
.add-btn:hover{background:#faf3ea;border-color:#c4a87a;color:#8a7a60}

.err{color:#c45a4a;font-size:11px;margin-top:4px}

/* Event list */
.ev-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.ev-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;
  background:#faf6f0;border-radius:10px;
  animation:fadeUp 0.25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.ev-item .ev-name{font-size:13px;font-weight:700;color:#5a4a3a}
.ev-item .ev-meta{font-size:11px;color:#a09080;margin-top:1px}
.ev-del{
  background:none;border:none;color:#c5b8a8;
  cursor:pointer;font-size:16px;padding:2px 6px;
  border-radius:6px;transition:all 0.15s;
}
.ev-del:hover{color:#c45a4a;background:rgba(196,90,74,0.08)}

/* Diagnose button */
.go-btn{
  width:100%;padding:15px;margin-top:4px;
  border-radius:14px;border:none;
  background:#e8a84c;color:#fff;
  font-size:16px;font-weight:900;
  cursor:pointer;transition:all 0.2s;
  font-family:inherit;
  box-shadow:0 2px 12px rgba(232,168,76,0.25);
  position:relative;overflow:hidden;
}
.go-btn:hover{background:#db9a3e;transform:translateY(-1px);box-shadow:0 4px 18px rgba(232,168,76,0.3)}
.go-btn:disabled{background:#d8ccba;box-shadow:none;cursor:not-allowed;transform:none;color:#f5f0e8}

/* ===== LOADING ===== */
.loading{
  display:none;position:fixed;inset:0;
  background:rgba(250,246,240,0.92);
  backdrop-filter:blur(6px);
  z-index:100;
  justify-content:center;align-items:center;
  flex-direction:column;gap:16px;
}
.loading.on{display:flex}

.ld-icon{font-size:48px;position:relative}
.ld-icon .umbrella{
  display:inline-block;
  animation:wobble 0.8s ease-in-out infinite alternate;
}
@keyframes wobble{0%{transform:rotate(-10deg)}100%{transform:rotate(10deg)}}

.ld-text{font-size:14px;color:#9e9080;font-family:'Klee One',serif;text-align:center}
.ld-bar{width:180px;height:3px;background:#e8e0d4;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:#e8a84c;border-radius:2px;transition:width 0.3s;width:0%}

/* ===== RESULTS ===== */
.result{display:none}
.result.on{display:block}

.res-card{
  background:#fff;border-radius:24px;
  padding:28px 20px 20px;text-align:center;
  margin-bottom:14px;
  box-shadow:0 2px 16px rgba(90,60,20,0.07);
  border:1px solid rgba(180,160,130,0.12);
  position:relative;overflow:hidden;
}

.res-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
}
.res-card.sunny::before{background:linear-gradient(90deg,#f0c040,#e89030)}
.res-card.rainy::before{background:linear-gradient(90deg,#7ab8e0,#5090c0)}
.res-card.cloudy::before{background:linear-gradient(90deg,#c0b8a8,#a09888)}
.res-card.snowy::before{background:linear-gradient(90deg,#b8d8f0,#90b8d8)}

.res-stamp{
  width:100px;height:100px;
  margin:0 auto 12px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  animation:stampIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  position:relative;
}

.res-stamp.sunny{background:linear-gradient(135deg,#fef5e0,#fde8c0)}
.res-stamp.rainy{background:linear-gradient(135deg,#e8f0f8,#d0e4f4)}
.res-stamp.cloudy{background:linear-gradient(135deg,#f0ece8,#e0d8d0)}
.res-stamp.snowy{background:linear-gradient(135deg,#eef4fa,#d8e8f4)}

@keyframes stampIn{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

.res-label{
  font-size:11px;color:#a09080;
  font-family:'Klee One',serif;
  margin-bottom:4px;
}
.res-type{
  font-size:30px;font-weight:900;
  margin-bottom:4px;
}
.res-type.sunny{color:#c87820}
.res-type.rainy{color:#4a7fb5}
.res-type.cloudy{color:#8a7a68}
.res-type.snowy{color:#6090b0}

.res-desc{font-size:13px;color:#9e9080;font-family:'Klee One',serif;line-height:1.6}

/* Gauge */
.gauge-row{
  display:flex;gap:12px;
  margin:20px 0 4px;
  justify-content:center;
}
.gauge{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:90px}
.gauge-ring{width:60px;height:60px;position:relative}
.gauge-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.gauge-ring .bg{fill:none;stroke:#f0ece4;stroke-width:5}
.gauge-ring .fg{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:163.4;stroke-dashoffset:163.4;transition:stroke-dashoffset 0.8s ease 0.2s}
.gauge-pct{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;
}
.gauge-name{font-size:11px;color:#a09080;font-weight:500}

/* Event results */
.ev-res{display:flex;flex-direction:column;gap:6px}
.ev-r{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;background:#faf6f0;border-radius:10px;
}
.ev-r .ev-name{font-size:13px;font-weight:700;color:#5a4a3a}
.ev-r .ev-meta{font-size:11px;color:#a09080;margin-top:1px}

.w-tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 10px;border-radius:8px;
  font-size:12px;font-weight:700;
  white-space:nowrap;
}
.w-tag.sunny{background:#fef5e0;color:#c07020}
.w-tag.rainy{background:#e8f0f8;color:#4a7fb5}
.w-tag.cloudy{background:#f0ece8;color:#8a7a68}
.w-tag.snowy{background:#eef4fa;color:#6090b0}

/* Share */
.share-row{display:flex;flex-direction:column;gap:8px}

.s-btn{
  width:100%;padding:13px;
  border-radius:12px;border:none;
  font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.s-btn:hover{transform:translateY(-1px)}

.s-btn.xpost{background:#1d1d1d;color:#fff}
.s-btn.xpost:hover{box-shadow:0 3px 12px rgba(0,0,0,0.15)}
.s-btn.imgdl{background:#5a8f5a;color:#fff}
.s-btn.imgdl:hover{box-shadow:0 3px 12px rgba(90,143,90,0.25)}
.s-btn.redo{background:#f0ece4;color:#7a6a55}

.preview-img{
  border-radius:12px;max-width:100%;margin:12px auto;
  display:block;box-shadow:0 2px 12px rgba(90,60,20,0.1);
  border:1px solid #e8e0d4;
}

canvas{display:none}

.footer-note{
  text-align:center;margin-top:24px;
  font-size:11px;color:#c5b8a8;
  font-family:'Klee One',serif;
}

@media(max-width:480px){
  .form-row{flex-direction:column;gap:8px}
  .hero h1{font-size:22px}
  .res-type{font-size:26px}
  .gauge-row{gap:8px}
}
</style>
</head>

<div class="wrap">
  <div class="hero">
    <div class="hero-deco"></div>
    <h1>あなたの人生、<br><span class="accent">晴れ</span>てた？<span class="accent2">雨</span>だった？</h1>
    <p class="hero-sub">大事な日の天気を調べて、体質を診断</p>
  </div>

  <div id="inputSection">
    <div class="sec">
      <div class="sec-title"><span class="dot" style="background:#e8a84c"></span>あなたのこと</div>
      <div class="nickname-row">
        <div class="field">
          <label>なまえ</label>
          <input type="text" id="nickname" placeholder="ニックネーム" maxlength="20">
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>表示タイプ</label>
        <div class="gender-pills">
          <button class="g-pill on" data-g="male" onclick="setG('male')">晴れ男 / 雨男</button>
          <button class="g-pill" data-g="female" onclick="setG('female')">晴れ女 / 雨女</button>
          <button class="g-pill" data-g="neutral" onclick="setG('neutral')">指定なし</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title"><span class="dot" style="background:#7ab8e0"></span>イベントを登録</div>
      <div class="tmpl-wrap" id="tmplWrap"></div>
      <div class="field">
        <label>どんなイベント？</label>
        <input type="text" id="evName" placeholder="例: 高校の入学式" maxlength="30">
      </div>
      <div class="form-row">
        <div class="field">
          <label>いつ？</label>
          <input type="date" id="evDate">
        </div>
        <div class="field loc-wrap">
          <label>どこで？</label>
          <input type="text" id="evLoc" placeholder="東京、大阪、京都…" autocomplete="off">
          <div class="suggestions" id="sug"></div>
        </div>
      </div>
      <button class="add-btn" onclick="addEv()">+ 追加する</button>
      <div class="err" id="err"></div>
      <div class="ev-list" id="evList"></div>
    </div>

    <button class="go-btn" id="goBtn" onclick="run()" disabled>あと3つ登録してね</button>
  </div>

  <div class="loading" id="ld">
    <div class="ld-icon"><span class="umbrella">&#9748;</span></div>
    <div class="ld-text" id="ldTxt">天気データをさがしています...</div>
    <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>
  </div>

  <div class="result" id="result">
    <div class="res-card" id="resCard">
      <div class="res-stamp" id="resStamp"></div>
      <div class="res-label" id="resLabel"></div>
      <div class="res-type" id="resType"></div>
      <div class="res-desc" id="resDesc"></div>
      <div class="gauge-row" id="gauges"></div>
    </div>

    <div class="sec">
      <div class="sec-title"><span class="dot" style="background:#90b070"></span>イベントごとの天気</div>
      <div class="ev-res" id="evRes"></div>
    </div>

    <div class="sec">
      <div class="sec-title"><span class="dot" style="background:#c07080"></span>みんなに見せる</div>
      <img class="preview-img" id="previewImg" style="display:none">
      <div class="share-row">
        <button class="s-btn imgdl" onclick="makeImg()">画像を保存する</button>
        <button class="s-btn xpost" onclick="postX()">&#120143; でポストする</button>
        <button class="s-btn redo" onclick="redo()">もう一回やる</button>
      </div>
    </div>
  </div>

  <div class="footer-note">実際の気象データ（Open-Meteo）を使用しています</div>
</div>

<canvas id="cvs" width="1080" height="1080"></canvas>

// City search: プリセット優先、APIで補完
const locIn=document.getElementById('evLoc'), sugEl=document.getElementById('sug');
locIn.addEventListener('input',()=>{
  clearTimeout(sto);sLat=sLon=null;
  const q=locIn.value.trim();
  if(q.length<1){sugEl.classList.remove('on');return}
  // まずプリセットから検索
  const local=CITIES.filter(c=>c.name.includes(q)).slice(0,6);
  if(local.length>0){
    showSuggestions(local.map(c=>({name:c.name,lat:c.lat,lon:c.lon})));
  }
  // APIでも並行して検索（結果が来たらマージ）
  sto=setTimeout(()=>findCity(q,local),400);
});
locIn.addEventListener('blur',()=>setTimeout(()=>sugEl.classList.remove('on'),200));

// items: [{name(入力欄にセットする値), label(表示用), lat, lon}]
function showSuggestions(items){
  sugEl.innerHTML='';
  items.forEach(c=>{
    const div=document.createElement('div');
    div.className='sug-item';
    div.textContent=c.label||c.name;  // 表示は詳細名
    div.onclick=()=>{
      locIn.value=c.name;             // 入力欄には都市名だけ
      sLat=c.lat; sLon=c.lon;
      sugEl.classList.remove('on');
    };
    sugEl.appendChild(div);
  });
  if(items.length>0)sugEl.classList.add('on');
  else sugEl.classList.remove('on');
}

async function findCity(q,localResults){
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=ja&format=json`);
    const d=await r.json();
    if(d.results?.length){
      const localNames=new Set((localResults||[]).map(c=>c.name));
      const apiItems=d.results
        .filter(c=>!localNames.has(c.name))
        .map(c=>{
          const parts=[c.name];
          if(c.admin1)parts.push(c.admin1);
          if(c.country)parts.push(c.country);
          return{
            name:c.name,              // 入力欄にセットする値（都市名のみ）
            label:parts.join('・'),   // 表示用（都市・県・国）
            lat:c.latitude, lon:c.longitude
          };
        });
      const presets=(localResults||[]).map(c=>({name:c.name,label:c.name,lat:c.lat,lon:c.lon}));
      const merged=[...presets,...apiItems].slice(0,6);
      if(locIn.value.trim().includes(q.charAt(0)))showSuggestions(merged);
    }
  }catch(e){
    // API失敗してもプリセット候補は既に表示済みなのでOK
  }
}

// Add event
function addEv(){
  const name=document.getElementById('evName').value.trim();
  const date=document.getElementById('evDate').value;
  const loc=locIn.value.trim();
  const err=document.getElementById('err');
  err.textContent='';

  if(!name){err.textContent='イベント名をいれてね';return}
  if(!date){err.textContent='日付をいれてね';return}
  if(!loc){err.textContent='場所をいれてね';return}
  // プリセットから完全一致で自動補完
  if(!sLat||!sLon){
    const match=CITIES.find(c=>c.name===loc);
    if(match){sLat=match.lat;sLon=match.lon}
    else{err.textContent='候補から場所をえらんでね（例: 東京、大阪）';return}
  }
  if(new Date(date)>new Date()){err.textContent='過去の日付にしてね';return}

  evs.push({name,date,loc,lat:sLat,lon:sLon});
  document.getElementById('evName').value='';
  document.getElementById('evDate').value='';
  locIn.value='';sLat=sLon=null;
  render();
}

function delEv(i){evs.splice(i,1);render()}

function render(){
  const list=document.getElementById('evList');
  list.innerHTML='';
  evs.forEach((ev,i)=>{
    const d=new Date(ev.date);
    const ds=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    list.innerHTML+=`<div class="ev-item"><div><div class="ev-name">${esc(ev.name)}</div><div class="ev-meta">${ds}・${esc(ev.loc)}</div></div><button class="ev-del" onclick="delEv(${i})">×</button></div>`;
  });
  const btn=document.getElementById('goBtn');
  const need=3-evs.length;
  if(need>0){btn.disabled=true;btn.textContent=`あと${need}つ登録してね`}
  else{btn.disabled=false;btn.textContent=`${evs.length}件で診断する`}
}

// Run diagnosis
async function run(){
  const ld=document.getElementById('ld');
  const fill=document.getElementById('ldFill');
  const txt=document.getElementById('ldTxt');
  ld.classList.add('on');

  const out=[];
  for(let i=0;i<evs.length;i++){
    const ev=evs[i];
    fill.style.width=((i+1)/evs.length*100)+'%';
    txt.textContent=`「${ev.name}」の天気を調べてる… (${i+1}/${evs.length})`;
    try{
      const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${ev.lat}&longitude=${ev.lon}&start_date=${ev.date}&end_date=${ev.date}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Asia%2FTokyo`;
      const r=await fetch(url);const d=await r.json();
      if(d.daily?.weather_code?.[0]!=null){
        const c=d.daily.weather_code[0];
        const w=WM[c]||{l:'不明',e:'？',t:'cloudy'};
        out.push({...ev,wc:c,w,tMax:d.daily.temperature_2m_max?.[0],tMin:d.daily.temperature_2m_min?.[0],prec:d.daily.precipitation_sum?.[0]});
      }else out.push({...ev,wc:-1,w:{l:'データなし',e:'？',t:'cloudy'},tMax:null,tMin:null,prec:null});
    }catch(e){out.push({...ev,wc:-1,w:{l:'エラー',e:'？',t:'cloudy'},tMax:null,tMin:null,prec:null})}
    if(i<evs.length-1)await slp(300);
  }
  res=out;ld.classList.remove('on');showRes();
}

function showRes(){
  document.getElementById('inputSection').style.display='none';
  document.getElementById('result').classList.add('on');

  const cnt={sunny:0,cloudy:0,rainy:0,snowy:0};
  res.forEach(r=>cnt[r.w.t]++);
  const tot=res.length;
  const sp=cnt.sunny/tot*100,rp=cnt.rainy/tot*100,cp=cnt.cloudy/tot*100,np=cnt.snowy/tot*100;

  const gl=gender==='male'?'男':gender==='female'?'女':'体質';
  let type,emoji,title,cls;
  if(sp>=50){type='sunny';emoji='☀️';title=`晴れ${gl}`;cls='sunny'}
  else if(rp>=50){type='rainy';emoji='☔';title=`雨${gl}`;cls='rainy'}
  else if(np>=30){type='snowy';emoji='❄️';title=`雪${gl}`;cls='snowy'}
  else{type='cloudy';emoji='⛅';title=`くもり${gl}`;cls='cloudy'}

  const nick=document.getElementById('nickname').value.trim()||'あなた';
  const card=document.getElementById('resCard');
  card.className='res-card '+cls;
  document.getElementById('resStamp').className='res-stamp '+cls;
  document.getElementById('resStamp').textContent=emoji;
  document.getElementById('resLabel').textContent=`${nick}の診断結果`;
  const tt=document.getElementById('resType');
  tt.className='res-type '+cls;tt.textContent=title;
  const descs=DESC[type];
  document.getElementById('resDesc').textContent=descs[Math.floor(Math.random()*descs.length)];

  // Gauges
  const gEl=document.getElementById('gauges');gEl.innerHTML='';
  const gData=[
    {n:'晴れ',p:sp,c:'#e8a84c'},{n:'くもり',p:cp,c:'#a09888'},
    {n:'雨',p:rp,c:'#5a9cc8'},{n:'雪',p:np,c:'#8ab8d8'},
  ];
  gData.forEach(g=>{
    if(g.p<=0&&g.n!=='晴れ'&&g.n!=='雨')return;
    const off=163.4-(163.4*g.p/100);
    gEl.innerHTML+=`<div class="gauge"><div class="gauge-ring"><svg viewBox="0 0 60 60"><circle class="bg" cx="30" cy="30" r="26"/><circle class="fg" cx="30" cy="30" r="26" stroke="${g.c}" style="stroke-dashoffset:${off}"/></svg><div class="gauge-pct" style="color:${g.c}">${g.p.toFixed(0)}%</div></div><div class="gauge-name">${g.n}</div></div>`;
  });

  // Event results
  const er=document.getElementById('evRes');er.innerHTML='';
  res.forEach(r=>{
    const d=new Date(r.date);
    const ds=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    const tmp=r.tMax!=null?` ${r.tMax}°C`:'';
    er.innerHTML+=`<div class="ev-r"><div><div class="ev-name">${esc(r.name)}</div><div class="ev-meta">${ds}・${esc(r.loc)}${tmp}</div></div><span class="w-tag ${r.w.t}">${r.w.e} ${r.w.l}</span></div>`;
  });

  document.getElementById('previewImg').style.display='none';
}

// Generate image (1:1 for SNS)
function makeImg(){
  const c=document.getElementById('cvs'),x=c.getContext('2d');
  const S=1080;

  const cnt={sunny:0,cloudy:0,rainy:0,snowy:0};
  res.forEach(r=>cnt[r.w.t]++);
  const tot=res.length;
  const sp=cnt.sunny/tot*100, cp=cnt.cloudy/tot*100,
        rp=cnt.rainy/tot*100,  np=cnt.snowy/tot*100;
  const gl=gender==='male'?'男':gender==='female'?'女':'体質';
  const nick=document.getElementById('nickname').value.trim()||'あなた';

  let type,emoji,title,mainCol,bgCol;
  if(sp>=50){type='sunny'; emoji='☀️';title=`晴れ${gl}`;mainCol='#e8a84c';bgCol='#fef8ed'}
  else if(rp>=50){type='rainy'; emoji='☔';title=`雨${gl}`;  mainCol='#5a9cc8';bgCol='#eef4fa'}
  else if(np>=30){type='snowy'; emoji='❄️';title=`雪${gl}`;  mainCol='#7ab4d4';bgCol='#eef6fc'}
  else            {type='cloudy';emoji='⛅';title=`くもり${gl}`;mainCol='#9a9080';bgCol='#f6f2ee'}

  // ── 背景 ──
  x.fillStyle=bgCol; x.fillRect(0,0,S,S);

  // 上部アクセントバー（細め）
  x.fillStyle=mainCol; x.fillRect(0,0,S,10);

  // ── スタンプ円 ──
  x.fillStyle='#fff';
  x.beginPath(); x.arc(S/2,220,110,0,Math.PI*2); x.fill();
  x.strokeStyle=mainCol+'44'; x.lineWidth=3;
  x.beginPath(); x.arc(S/2,220,110,0,Math.PI*2); x.stroke();

  // 絵文字
  x.font='90px sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText(emoji, S/2, 222);

  // ── テキスト ──
  x.textBaseline='alphabetic';
  x.font=`500 26px sans-serif`; x.fillStyle='#a09080';
  x.fillText(`${nick}の人生${tot}イベントを調べたら…`, S/2, 390);

  x.font=`900 80px sans-serif`; x.fillStyle=mainCol;
  x.fillText(title, S/2, 490);

  // ── 天気バー（全4種） ──
  const bars=[
    {label:'☀️ 晴れ', pct:sp, col:'#e8a84c'},
    {label:'☁️ くもり',pct:cp, col:'#b0a898'},
    {label:'🌧 雨',   pct:rp, col:'#5a9cc8'},
    {label:'❄️ 雪',   pct:np, col:'#7ab4d4'},
  ];
  const bx=140, bw=800, bh=44, gap=60;
  let byStart=555;
  x.font=`700 20px sans-serif`; x.textAlign='left';
  bars.forEach(b=>{
    // 背景トラック
    rr(x,bx,byStart,bw,bh,10); x.fillStyle='#e8e2da'; x.fill();
    // 塗りバー（最低幅は0%なら描かない）
    if(b.pct>0){
      const fw=Math.max(bw*b.pct/100, bh); // 最小幅=高さ（角丸のため）
      rr(x,bx,byStart,fw,bh,10); x.fillStyle=b.col; x.fill();
    }
    // ラベル
    const labelCol = b.pct>35 ? '#fff' : '#7a6a55';
    x.fillStyle=labelCol;
    x.fillText(`${b.label}  ${b.pct.toFixed(0)}%`, bx+16, byStart+bh*0.67);
    byStart+=gap;
  });

  // ── イベントミニカード ──
  const preN=Math.min(res.length,5);
  const cardW=140, cardH=80, cardGap=(S-preN*cardW)/(preN+1);
  const cardY=byStart+20;
  x.textAlign='center';
  for(let i=0;i<preN;i++){
    const r=res[i];
    const cx=cardGap+(cardW+cardGap)*i;
    rr(x,cx,cardY,cardW,cardH,12); x.fillStyle='#fff'; x.fill();
    rr(x,cx,cardY,cardW,cardH,12); x.strokeStyle='#e8e0d4'; x.lineWidth=1.5; x.stroke();
    x.font='30px sans-serif'; x.fillStyle='#3d3529';
    x.fillText(r.w.e, cx+cardW/2, cardY+38);
    x.font=`600 13px sans-serif`; x.fillStyle='#7a6a55';
    const nm=r.name.length>5?r.name.slice(0,5)+'…':r.name;
    x.fillText(nm, cx+cardW/2, cardY+62);
  }

  // ── フッター ──
  x.font=`400 18px sans-serif`; x.fillStyle='#c5b8a8'; x.textAlign='center';
  x.fillText('#晴れか雨か診断', S/2, S-36);

  // ── 外枠 ──
  x.strokeStyle='#e0d8d0'; x.lineWidth=2;
  rr(x,6,6,S-12,S-12,20); x.stroke();

  const url=c.toDataURL('image/png');
  document.getElementById('previewImg').src=url;
  document.getElementById('previewImg').style.display='block';
  const a=document.createElement('a'); a.href=url; a.download='晴れか雨か診断.png'; a.click();
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function redo(){
  document.getElementById('result').classList.remove('on');
  document.getElementById('inputSection').style.display='block';
  document.getElementById('previewImg').style.display='none';
  res=null;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function slp(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
